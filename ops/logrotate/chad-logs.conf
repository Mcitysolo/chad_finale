# W3B-11 — logrotate for CHAD file logs that in-process rotation cannot cover.
# Repo-side design artifact: operator installs per docs/CHAD_LOGROTATE_INSTALL.md
# (never installed automatically). Style mirrors /etc/logrotate.d/chad-backend
# (copytruncate + su ubuntu ubuntu).
#
# Scope note: the two Python client logs (logs/claude/claude_client.log,
# logs/gpt/gpt_client.log) rotate IN-PROCESS via RotatingFileHandler as of
# W3B-11 and are deliberately NOT listed here — a second rotator on the same
# file risks the double-rotation class documented for telegram_bot.log.
# logs/telegram_bot.log is also NOT listed: it has two writers (in-process
# RotatingFileHandler + the systemd unit's append: fd) and its own rotation;
# never rename-rotate it.

/home/ubuntu/chad_finale/logs/consensus_update.log {
    su ubuntu ubuntu
    weekly
    rotate 8
    maxsize 20M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
