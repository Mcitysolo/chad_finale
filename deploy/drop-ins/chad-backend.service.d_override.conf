[Service]
WorkingDirectory=/home/ubuntu/chad_finale
Environment=PYTHONPATH=/home/ubuntu/chad_finale
EnvironmentFile=/etc/chad/telegram.env
EnvironmentFile=/etc/chad/openai.env
EnvironmentFile=/etc/chad/kraken.env
EnvironmentFile=/etc/chad/ibkr.env
EnvironmentFile=/etc/chad/polygon.env
ExecStart=
ExecStart=/bin/bash -lc 'cd "/home/ubuntu/chad_finale" && exec /home/ubuntu/chad_finale/venv/bin/python3 -m uvicorn backend.app:app --host 0.0.0.0 --port 9618 --log-level info'
