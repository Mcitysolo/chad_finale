# 60-paper-notice-autodismiss.conf  —  STAGED, NOT INSTALLED.
#
# Wires scripts/dismiss_paper_account_notice.py as an ExecStartPost of
# chad-ibgateway.service so the "Paper Account Notice" modal that IBC 3.23.0
# fails to auto-dismiss is clicked away after a Gateway (re)start, unblocking
# API port 4002.
#
# This file lives in the repo only. It is INERT until an operator copies it,
# under explicit GO, to the live drop-in directory and reloads systemd:
#
#     sudo install -m 0644 -o root -g root \
#       /home/ubuntu/chad_finale/systemd/chad-ibgateway-drop-in/60-paper-notice-autodismiss.conf \
#       /etc/systemd/system/chad-ibgateway.service.d/60-paper-notice-autodismiss.conf
#     sudo systemctl daemon-reload
#
# Rollback:  sudo rm /etc/systemd/system/chad-ibgateway.service.d/60-paper-notice-autodismiss.conf
#            sudo systemctl daemon-reload
#
# See ops/pending_actions/PA_paper_notice_autodismiss_2026-06-24.md for the full
# Consequence Block, arm/verify procedure, and the Type=/TimeoutStartSec analysis.
#
# Unit facts (verified from /etc/systemd/system/chad-ibgateway.service):
#   - Type=simple (line 9): ExecStartPost is spawned right after ExecStart is
#     forked, while the dialog is appearing — this is the correct hook point.
#   - No explicit TimeoutStartSec -> inherits DefaultTimeoutStartUSec=90s. The
#     watcher's worst case (notice NEVER seen) polls the full 120s budget, which
#     would EXCEED 90s and, with Restart=always (line 34), trip a start-timeout
#     restart loop. TimeoutStartSec below raises the start window above the
#     watcher budget. (In the dialog-present case the watcher dismisses and
#     exits in seconds, well under any timeout.)

[Service]
# Raise the start window above the 120s watcher budget (default is 90s, which is
# shorter than the watcher's NOT_SEEN worst case). Safe-direction change: it only
# lengthens how long systemd waits before declaring start failure.
TimeoutStartSec=180

ExecStartPost=/home/ubuntu/chad_finale/venv/bin/python3 /home/ubuntu/chad_finale/scripts/dismiss_paper_account_notice.py

# ARMING (second gate): the watcher is DRY-RUN by default and performs NO click
# unless CHAD_NOTICE_DISMISS_ARMED=1 is present in its environment. To actually
# dismiss the dialog in production, uncomment the line below (this is the
# deliberate arm step — see the PA). Left commented so that even an installed
# drop-in is observe-only until the operator explicitly arms it.
#Environment=CHAD_NOTICE_DISMISS_ARMED=1
